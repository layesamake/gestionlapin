<!DOCTYPE html>

<html class="dark" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Lapin Manager - Ajouter une Race</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500&amp;family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        brand: {
                            canvas: "#0B0F19",
                            card: "#161B26",
                            border: "#242B3B",
                            white: "#F3F4F6",
                            muted: "#9CA3AF",
                            primary: "#10B981", // Vert Moderne
                            secondary: "#06B6D4", // Bleu Cyan
                            warning: "#F59E0B", // Orange Cuivre
                            danger: "#EF4444", // Rouge Alerte
                            neutral: "#6B7280"
                        }
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        headline: ["Outfit", "sans-serif"],
                        display: ["Outfit", "sans-serif"],
                        body: ["Outfit", "sans-serif"],
                        label: ["Outfit", "sans-serif"],
                        mono: ["JetBrains Mono", "monospace"]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #0B0F19;
            color: #F3F4F6;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #0B0F19;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #242B3B;
            border-radius: 10px;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-4 h-16 bg-[#0B0F19] border-b border-[#242B3B]">
<button class="text-brand-muted hover:text-brand-white transition-colors active:scale-95">
            Annuler
        </button>
<h1 class="text-[#F3F4F6] font-headline font-bold text-lg tracking-tight">Ajouter une Race</h1>
<button class="text-[#10B981] font-bold hover:opacity-80 transition-all active:scale-95">
            Enregistrer
        </button>
</header>
<!-- Main Content Area -->
<main class="flex-grow pt-20 pb-24 px-4 overflow-y-auto custom-scrollbar">
<!-- Offline Indicator (Design System mandate) -->
<div class="mb-6 flex justify-center">
<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-brand-secondary/10 text-brand-secondary text-xs font-medium">
<span class="material-symbols-outlined text-[14px]">cloud_off</span>
                Fonctionne sans Internet • Données locales
            </span>
</div>
<form class="space-y-6">
<!-- Nom de la race -->
<div class="space-y-1.5">
<label class="block text-sm font-medium text-brand-muted" for="race_name">
                    Nom de la race <span class="text-brand-danger">*</span>
</label>
<input class="w-full bg-brand-card border border-brand-border rounded-lg px-4 py-3 text-brand-white focus:ring-2 focus:ring-brand-primary focus:border-transparent outline-none transition-all placeholder:text-brand-muted/50" id="race_name" name="race_name" placeholder="ex: Géant des Flandres, Californien..." required="" type="text"/>
</div>
<!-- Description -->
<div class="space-y-1.5">
<label class="block text-sm font-medium text-brand-muted" for="description">
                    Description (facultatif)
                </label>
<input class="w-full bg-brand-card border border-brand-border rounded-lg px-4 py-3 text-brand-white focus:ring-2 focus:ring-brand-secondary focus:border-transparent outline-none transition-all placeholder:text-brand-muted/50" id="description" name="description" placeholder="Caractéristiques principales" type="text"/>
</div>
<!-- Poids moyen -->
<div class="space-y-1.5">
<label class="block text-sm font-medium text-brand-muted" for="average_weight">
                    Poids moyen adulte (kg)
                </label>
<div class="relative">
<input class="w-full bg-brand-card border border-brand-border rounded-lg px-4 py-3 text-brand-white font-mono focus:ring-2 focus:ring-brand-primary focus:border-transparent outline-none transition-all placeholder:text-brand-muted/50" id="average_weight" name="average_weight" placeholder="4.5" step="0.1" type="number"/>
<div class="absolute inset-y-0 right-4 flex items-center pointer-events-none text-brand-muted font-mono text-sm">
                        kg
                    </div>
</div>
</div>
<!-- Remarques -->
<div class="space-y-1.5">
<label class="block text-sm font-medium text-brand-muted" for="remarks">
                    Remarques ou spécificités
                </label>
<textarea class="w-full bg-brand-card border border-brand-border rounded-lg px-4 py-3 text-brand-white focus:ring-2 focus:ring-brand-secondary focus:border-transparent outline-none transition-all placeholder:text-brand-muted/50 resize-none" id="remarks" name="remarks" placeholder="Race très prolifique, rustique..." rows="3"></textarea>
</div>
<!-- Aide / Info Section -->
<div class="bg-brand-card/50 border-l-4 border-brand-secondary rounded-xl p-4 flex gap-4">
<div class="flex-shrink-0 mt-1">
<span class="material-symbols-outlined text-brand-secondary">info</span>
</div>
<div class="space-y-1">
<p class="text-sm font-semibold text-brand-white">Conseils de saisie</p>
<p class="text-xs text-brand-muted leading-relaxed">
                        Exemples de races courantes : Géant des Flandres, Californien, Néo-Zélandais, Croisé, Race locale.
                    </p>
</div>
</div>
<!-- Primary Actions -->
<div class="pt-6 space-y-3">
<button class="w-full bg-[#10B981] text-brand-canvas font-bold py-4 rounded-lg active:scale-[0.98] transition-transform flex justify-center items-center gap-2 shadow-lg shadow-brand-primary/10" type="submit">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">save</span>
                    Enregistrer la race
                </button>
<button class="w-full bg-transparent border border-brand-border text-brand-muted font-semibold py-4 rounded-lg active:scale-[0.98] transition-transform" type="button">
                    Annuler
                </button>
</div>
</form>
<!-- Visual Background Decoration (Subtle Gradient) -->
<div class="fixed inset-0 pointer-events-none -z-10 bg-[radial-gradient(circle_at_bottom_right,_var(--tw-gradient-stops))] from-brand-primary/5 via-transparent to-transparent opacity-50"></div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 bg-[#0B0F19] px-2 border-t border-[#242B3B] shadow-2xl">
<!-- Accueil -->
<a class="flex flex-col items-center justify-center text-[#9CA3AF] active:scale-95 transition-all duration-150" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-label text-[10px] font-medium">Accueil</span>
</a>
<!-- Cheptel (ACTIVE) -->
<a class="flex flex-col items-center justify-center text-[#10B981] font-bold active:scale-95 transition-all duration-150" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">pets</span>
<span class="font-label text-[10px] font-medium">Cheptel</span>
</a>
<!-- Reproduction -->
<a class="flex flex-col items-center justify-center text-[#9CA3AF] active:scale-95 transition-all duration-150" href="#">
<span class="material-symbols-outlined">fertile</span>
<span class="font-label text-[10px] font-medium">Reproduction</span>
</a>
<!-- Santé -->
<a class="flex flex-col items-center justify-center text-[#9CA3AF] active:scale-95 transition-all duration-150" href="#">
<span class="material-symbols-outlined">medical_services</span>
<span class="font-label text-[10px] font-medium">Santé</span>
</a>
<!-- Alertes -->
<a class="flex flex-col items-center justify-center text-[#9CA3AF] active:scale-95 transition-all duration-150" href="#">
<div class="relative">
<span class="material-symbols-outlined">notifications</span>
<span class="absolute top-0 right-0 w-2 h-2 bg-brand-danger rounded-full"></span>
</div>
<span class="font-label text-[10px] font-medium">Alertes</span>
</a>
</nav>
<script>
        // Micro-interaction for input fields
        document.querySelectorAll('input, textarea').forEach(el => {
            el.addEventListener('focus', () => {
                el.parentElement.querySelector('label').classList.replace('text-brand-muted', 'text-brand-primary');
            });
            el.addEventListener('blur', () => {
                el.parentElement.querySelector('label').classList.replace('text-brand-primary', 'text-brand-muted');
            });
        });

        // Simple form validation feedback
        const form = document.querySelector('form');
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const submitBtn = form.querySelector('button[type="submit"]');
            const originalContent = submitBtn.innerHTML;
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Enregistrement...';
            
            setTimeout(() => {
                submitBtn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Race ajoutée !';
                submitBtn.classList.replace('bg-[#10B981]', 'bg-brand-secondary');
                
                setTimeout(() => {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalContent;
                    submitBtn.classList.replace('bg-brand-secondary', 'bg-[#10B981]');
                }, 2000);
            }, 1500);
        });
    </script>
</body></html>
