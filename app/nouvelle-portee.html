<!DOCTYPE html>

<html class="dark" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Lapin Manager - Nouvelle Portée</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        brand: {
                            canvas: "#0B0F19",
                            card: "#161B26",
                            border: "#242B3B",
                            white: "#F3F4F6",
                            muted: "#9CA3AF",
                            green: "#10B981",
                            cyan: "#06B6D4",
                            orange: "#F59E0B",
                            red: "#EF4444",
                            neutral: "#6B7280"
                        }
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        headline: ["Outfit", "sans-serif"],
                        display: ["Outfit", "sans-serif"],
                        body: ["Outfit", "sans-serif"],
                        label: ["Outfit", "sans-serif"],
                        mono: ["JetBrains Mono", "monospace"]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #0B0F19;
            color: #F3F4F6;
            font-family: 'Outfit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex flex-col min-h-screen pb-20">
<!-- TopAppBar -->
<header class="fixed top-0 w-full bg-[#0B0F19] text-[#10B981] font-headline font-bold text-lg border-b border-[#242B3B] flex justify-between items-center px-4 h-16 z-50">
<button class="text-brand-muted font-medium text-base active:scale-95 transition-transform">Annuler</button>
<span class="text-brand-white font-display font-bold tracking-tight">Nouvelle Portée</span>
<button class="text-brand-green font-bold text-base active:scale-95 transition-transform">Enregistrer</button>
</header>
<!-- Main Content Canvas -->
<main class="mt-16 px-4 py-6 space-y-6">
<!-- Connection Status Banner -->
<div class="bg-brand-card/50 border border-brand-border rounded-lg px-3 py-2 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[14px] text-brand-muted">cloud_off</span>
<span class="text-[12px] font-medium text-brand-muted">Fonctionne sans Internet • Données locales</span>
</div>
<!-- Form Section -->
<section class="space-y-5">
<!-- Female Selection -->
<div class="space-y-1.5">
<label class="block text-[13px] font-medium text-brand-muted ml-1">Sélection de la femelle *</label>
<div class="relative group">
<select class="w-full bg-brand-card border border-brand-border rounded-lg px-4 py-3 text-brand-white focus:ring-1 focus:ring-brand-green focus:border-brand-green appearance-none font-mono">
<option value="F-012">F-012</option>
<option value="F-013">F-013</option>
<option value="F-014">F-014</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-brand-muted pointer-events-none">expand_more</span>
</div>
</div>
<!-- Mating Link -->
<div class="space-y-1.5">
<label class="block text-[13px] font-medium text-brand-muted ml-1">Saillie liée</label>
<div class="relative group">
<select class="w-full bg-brand-card border border-brand-border rounded-lg px-4 py-3 text-brand-white focus:ring-1 focus:ring-brand-cyan focus:border-brand-cyan appearance-none font-mono">
<option value="s1">Saillie du 16/05/2026</option>
<option value="s2">Saillie du 10/05/2026</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-brand-muted pointer-events-none">link</span>
</div>
</div>
<!-- Date Selection -->
<div class="space-y-1.5">
<label class="block text-[13px] font-medium text-brand-muted ml-1">Date de la mise bas *</label>
<div class="relative">
<input class="w-full bg-brand-card border border-brand-border rounded-lg px-4 py-3 text-brand-white focus:ring-1 focus:ring-brand-green focus:border-brand-green font-mono" type="date" value="2026-06-17"/>
</div>
</div>
<!-- Numerical Grid -->
<div class="grid grid-cols-3 gap-3">
<div class="space-y-1.5">
<label class="block text-[11px] font-bold text-brand-muted text-center uppercase tracking-wider">Total nés</label>
<input class="w-full bg-brand-card border border-brand-border rounded-lg py-3 text-center text-xl font-bold text-brand-white focus:border-brand-white transition-colors" type="number" value="9"/>
</div>
<div class="space-y-1.5">
<label class="block text-[11px] font-bold text-brand-green text-center uppercase tracking-wider">Nés vivants</label>
<input class="w-full bg-brand-card border-2 border-brand-green/30 rounded-lg py-3 text-center text-xl font-bold text-brand-green focus:border-brand-green transition-colors" type="number" value="8"/>
</div>
<div class="space-y-1.5">
<label class="block text-[11px] font-bold text-brand-red text-center uppercase tracking-wider">Morts-nés</label>
<input class="w-full bg-brand-card border-2 border-brand-red/30 rounded-lg py-3 text-center text-xl font-bold text-brand-red focus:border-brand-red transition-colors" type="number" value="1"/>
</div>
</div>
<!-- Location -->
<div class="space-y-1.5">
<label class="block text-[13px] font-medium text-brand-muted ml-1">Emplacement / Cage</label>
<input class="w-full bg-brand-card border border-brand-border rounded-lg px-4 py-3 text-brand-white focus:ring-1 focus:ring-brand-green focus:border-brand-green font-mono" placeholder="ex: Cage A3" type="text" value="Cage A3"/>
</div>
<!-- Observations -->
<div class="space-y-1.5">
<label class="block text-[13px] font-medium text-brand-muted ml-1">Observations</label>
<textarea class="w-full bg-brand-card border border-brand-border rounded-lg px-4 py-3 text-brand-white focus:ring-1 focus:ring-brand-green focus:border-brand-green resize-none" rows="3"></textarea>
</div>
</section>
<!-- Monitoring Section -->
<section class="bg-brand-card border border-brand-border rounded-xl p-5 space-y-4">
<h3 class="text-brand-muted font-bold text-xs uppercase tracking-widest flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]">event_repeat</span>
                Suivi Prévu
            </h3>
<div class="space-y-3">
<div class="flex justify-between items-center">
<span class="text-brand-white text-sm">Âge actuel de la portée</span>
<span class="text-brand-cyan font-bold">0 jour</span>
</div>
<div class="h-px bg-brand-border"></div>
<div class="flex flex-col gap-1">
<div class="flex justify-between items-center">
<span class="text-brand-white text-sm">Sevrage prévu le</span>
<span class="font-mono text-brand-orange font-bold">22/07/2026</span>
</div>
<span class="text-brand-muted text-[12px] text-right italic">(dans 35 jours)</span>
</div>
<div class="flex justify-between items-center pt-2">
<span class="text-brand-white text-sm">Statut initial</span>
<span class="bg-brand-green/10 text-brand-green text-[11px] font-bold px-2 py-0.5 rounded border border-brand-green/20 uppercase tracking-tighter">Née</span>
</div>
</div>
</section>
<!-- Final Action Buttons -->
<div class="space-y-3 pt-4">
<button class="w-full bg-brand-green text-brand-canvas font-bold py-4 rounded-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">save</span>
                Enregistrer la portée
            </button>
<button class="w-full border border-brand-border text-brand-muted font-medium py-4 rounded-lg active:scale-[0.98] transition-all">
                Annuler
            </button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 bg-[#0B0F19] px-2 border-t border-[#242B3B] shadow-2xl">
<a class="flex flex-col items-center justify-center text-[#9CA3AF] active:scale-95 transition-all duration-150" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-label text-[10px] font-medium mt-1">Accueil</span>
</a>
<a class="flex flex-col items-center justify-center text-[#9CA3AF] active:scale-95 transition-all duration-150" href="#">
<span class="material-symbols-outlined">pets</span>
<span class="font-label text-[10px] font-medium mt-1">Cheptel</span>
</a>
<a class="flex flex-col items-center justify-center text-[#10B981] font-bold active:scale-95 transition-all duration-150" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">fertile</span>
<span class="font-label text-[10px] font-medium mt-1">Reproduction</span>
</a>
<a class="flex flex-col items-center justify-center text-[#9CA3AF] active:scale-95 transition-all duration-150" href="#">
<span class="material-symbols-outlined">medical_services</span>
<span class="font-label text-[10px] font-medium mt-1">Santé</span>
</a>
<a class="flex flex-col items-center justify-center text-[#9CA3AF] active:scale-95 transition-all duration-150" href="#">
<span class="material-symbols-outlined">notifications</span>
<span class="font-label text-[10px] font-medium mt-1">Alertes</span>
</a>
</nav>
</body></html>
