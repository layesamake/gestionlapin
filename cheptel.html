<!DOCTYPE html>

<html class="dark" lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Lapin Manager - Cheptel</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500&amp;family=Outfit:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "brand-bg": "#0B0F19",
                        "brand-card": "#161B26",
                        "brand-border": "#242B3B",
                        "brand-text": "#F3F4F6",
                        "brand-muted": "#9CA3AF",
                        "brand-primary": "#10B981",
                        "brand-secondary": "#06B6D4",
                        "brand-warning": "#F59E0B",
                        "brand-danger": "#EF4444",
                        "brand-neutral": "#6B7280"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Outfit", "sans-serif"],
                        "display": ["Outfit", "sans-serif"],
                        "body": ["Outfit", "sans-serif"],
                        "label": ["Public Sans", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #0B0F19;
            color: #F3F4F6;
            -webkit-tap-highlight-color: transparent;
        }
        /* Custom scrollbar for horizontal chips */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body selection:bg-brand-primary/30 pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full bg-[#0B0F19] text-[#10B981] z-50 flex justify-between items-center px-4 h-16 border-b border-[#242B3B]">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[#10B981]">cloud_off</span>
<div class="flex flex-col">
<h1 class="text-[#F3F4F6] font-display font-bold tracking-tight text-lg leading-tight">Cheptel</h1>

</div>
</div>

<span class="material-symbols-outlined text-[#9CA3AF]">settings</span>
</button>
</header>
<main class="mt-20 px-4 space-y-6">
<!-- Search & Quick Filters -->
<section class="space-y-4">
<div class="relative group">

<input class="w-full bg-brand-card border border-brand-border rounded-xl py-3 pl-10 pr-4 text-brand-text placeholder:text-brand-muted focus:ring-1 focus:ring-brand-primary focus:border-brand-primary outline-none transition-all" placeholder="Rechercher par code, race ou statut..." type="text"/>
</div>
<div class="flex overflow-x-auto gap-2 hide-scrollbar -mx-4 px-4 pb-2">
<button class="whitespace-nowrap px-4 py-1.5 rounded-full bg-brand-primary text-brand-bg font-semibold text-sm transition-all active:scale-95">Tous</button>
<button class="whitespace-nowrap px-4 py-1.5 rounded-full bg-brand-card border border-brand-border text-brand-muted font-medium text-sm hover:border-brand-primary/50 transition-all active:scale-95">Mâles</button>
<button class="whitespace-nowrap px-4 py-1.5 rounded-full bg-brand-card border border-brand-border text-brand-muted font-medium text-sm hover:border-brand-primary/50 transition-all active:scale-95">Femelles</button>
<button class="whitespace-nowrap px-4 py-1.5 rounded-full bg-brand-card border border-brand-border text-brand-muted font-medium text-sm hover:border-brand-primary/50 transition-all active:scale-95">Gestantes</button>
<button class="whitespace-nowrap px-4 py-1.5 rounded-full bg-brand-card border border-brand-border text-brand-muted font-medium text-sm hover:border-brand-primary/50 transition-all active:scale-95">Allaitantes</button>
<button class="whitespace-nowrap px-4 py-1.5 rounded-full bg-brand-card border border-brand-border text-brand-muted font-medium text-sm hover:border-brand-primary/50 transition-all active:scale-95">Au repos</button>
</div>
</section>
<!-- Herd List -->
<section class="space-y-3">

    <div class="flex items-center gap-2">
      <span class="font-mono font-bold text-sm text-brand-muted">F-012</span>
      <span class="font-bold text-base text-brand-text truncate">Blanchette</span>
      <span class="material-symbols-outlined text-pink-500 text-[18px]">female</span>
    </div>
    <div class="flex items-center gap-2">
      <span class="text-[10px] px-2 py-0.5 rounded font-bold uppercase tracking-wider bg-brand-primary/10 text-brand-primary">Gestante</span>
    </div>

</div>

<div class="bg-brand-card border border-brand-border rounded-xl p-3 flex items-center gap-4 shadow-sm hover:border-brand-primary/30 transition-all hover:scale-[1.01] cursor-pointer" onclick="location.href='fiche-reproducteur.html'">
  <div class="w-16 h-16 rounded-xl overflow-hidden flex-shrink-0 bg-brand-border/40 flex items-center justify-center border border-brand-border">
    <img src="https://images.unsplash.com/photo-1518796745738-41048802f99a?auto=format&fit=crop&q=80&w=800" alt="Gribouille" class="w-full h-full object-cover" />
  </div>
  <div class="flex-grow min-w-0 flex flex-col gap-1.5">
    <div class="flex items-center gap-2">
      <span class="font-mono font-bold text-sm text-brand-muted">M-004</span>
      <span class="font-bold text-base text-brand-text truncate">Gribouille</span>
      <span class="material-symbols-outlined text-brand-secondary text-[18px]">male</span>
    </div>
    <div class="flex items-center gap-2">
      <span class="text-[10px] px-2 py-0.5 rounded font-bold uppercase tracking-wider bg-brand-secondary/10 text-brand-secondary">Actif</span>
    </div>
  </div>
</div>
<!-- Animal Card 3 -->
<div class="bg-brand-card border border-brand-warning/30 border-l-4 border-l-brand-warning rounded-r-xl rounded-l-none p-3 flex items-center gap-4 shadow-sm hover:border-brand-warning/50 transition-all hover:scale-[1.01] cursor-pointer" onclick="location.href='fiche-reproducteur.html'">
  <div class="w-16 h-16 rounded-xl overflow-hidden flex-shrink-0 bg-brand-border/40 flex items-center justify-center border border-brand-border">
    <img src="https://images.unsplash.com/photo-1591561582301-7ce6588cc286?auto=format&fit=crop&q=80&w=800" alt="Cacao" class="w-full h-full object-cover" />

  <div class="flex-grow min-w-0 flex flex-col gap-1.5">

      <span class="font-mono font-bold text-sm text-brand-muted">F-021</span>
      <span class="font-bold text-base text-brand-text truncate">Cacao</span>
      <span class="material-symbols-outlined text-pink-500 text-[18px]">female</span>
    </div>
    <div class="flex items-center gap-2">
      <span class="text-[10px] px-2 py-0.5 rounded font-bold uppercase tracking-wider bg-brand-secondary/10 text-brand-secondary">Allaitante</span>
    </div>

</div>
<!-- Animal Card 4 -->
<div class="bg-brand-card border border-brand-border rounded-xl p-3 flex items-center gap-4 shadow-sm hover:border-brand-primary/30 transition-all hover:scale-[1.01] cursor-pointer" onclick="location.href='fiche-reproducteur.html'">
  <div class="w-16 h-16 rounded-xl overflow-hidden flex-shrink-0 bg-brand-border/40 flex items-center justify-center border border-brand-border">
    <img src="https://images.unsplash.com/photo-1535591273668-578e31182c4f?auto=format&fit=crop&q=80&w=800" alt="Plume" class="w-full h-full object-cover" />
  </div>
  <div class="flex-grow min-w-0 flex flex-col gap-1.5">
    <div class="flex items-center gap-2">
      <span class="font-mono font-bold text-sm text-brand-muted">F-008</span>
      <span class="font-bold text-base text-brand-text truncate">Plume</span>
      <span class="material-symbols-outlined text-pink-500 text-[18px]">female</span>
    </div>
    <div class="flex items-center gap-2">
      <span class="text-[10px] px-2 py-0.5 rounded font-bold uppercase tracking-wider bg-brand-neutral/10 text-brand-neutral">Au repos</span>
    </div>
  </div>
</div>
</section>
<!-- Actions -->
<section class="flex flex-col gap-3 pt-4">
<button class="flex items-center justify-center gap-2 w-full py-4 bg-brand-primary text-brand-bg rounded-xl font-bold active:scale-95 transition-transform">
<span class="material-symbols-outlined">add_circle</span>
                Nouveau reproducteur
            </button>
<button class="flex items-center justify-center gap-2 w-full py-3 border border-brand-border text-brand-text rounded-xl font-semibold active:scale-95 transition-transform">
<span class="material-symbols-outlined">pets</span>
                Nouvelle race
            </button>
</section>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 bg-[#0B0F19] px-2 border-t border-[#242B3B] shadow-2xl">
<a class="flex flex-col items-center justify-center text-[#9CA3AF] active:scale-95 transition-all duration-150" href="#">
<span class="material-symbols-outlined">home</span>
<span class="font-label text-[10px] font-medium mt-1">Accueil</span>
</a>
<a class="flex flex-col items-center justify-center text-[#10B981] font-bold active:scale-95 transition-all duration-150" href="#">
<span class="material-symbols-outlined">pets</span>
<span class="font-label text-[10px] font-medium mt-1">Cheptel</span>
</a>
<a class="flex flex-col items-center justify-center text-[#9CA3AF] active:scale-95 transition-all duration-150" href="#">
<span class="material-symbols-outlined">fertile</span>
<span class="font-label text-[10px] font-medium mt-1">Reproduction</span>
</a>
<a class="flex flex-col items-center justify-center text-[#9CA3AF] active:scale-95 transition-all duration-150" href="#">
<span class="material-symbols-outlined">medical_services</span>
<span class="font-label text-[10px] font-medium mt-1">Santé</span>
</a>
<a class="flex flex-col items-center justify-center text-[#9CA3AF] active:scale-95 transition-all duration-150" href="#">
<span class="material-symbols-outlined">notifications</span>
<span class="font-label text-[10px] font-medium mt-1">Alertes</span>
</a>
</nav>
<script>
        // Simple micro-interaction for filter chips
        const chips = document.querySelectorAll('.hide-scrollbar button');
        chips.forEach(chip => {
            chip.addEventListener('click', () => {
                chips.forEach(c => {
                    c.classList.remove('bg-brand-primary', 'text-brand-bg', 'font-semibold');
                    c.classList.add('bg-brand-card', 'border', 'border-brand-border', 'text-brand-muted', 'font-medium');
                });
                chip.classList.remove('bg-brand-card', 'border', 'border-brand-border', 'text-brand-muted', 'font-medium');
                chip.classList.add('bg-brand-primary', 'text-brand-bg', 'font-semibold');
            });
        });

        // Add haptic feedback simulation
        const buttons = document.querySelectorAll('button, a');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                if (window.navigator.vibrate) {
                    window.navigator.vibrate(5);
                }
            });
        });
    </script>
</body></html>
